<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aspose-pdf-foss-for-go — PDF demo</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app">
    <!-- Left: sidebar with upload + file list -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">PDF</span>
          <span class="brand-name">aspose-pdf-foss</span>
        </div>
        <button id="upload-btn" class="btn-primary" type="button">+ Upload</button>
        <input id="file-input" type="file" accept="application/pdf" multiple hidden>
        <p id="upload-msg" class="upload-msg"></p>
      </div>
      <ul id="file-list" class="file-list"></ul>
    </aside>

    <!-- Right: render of the selected document -->
    <main class="detail">
      <header class="detail-head">
        <span id="doc-title" class="doc-title">Select a document</span>
        <button id="rerender" class="btn-ghost" type="button" hidden>↻ Re-render</button>
        <a id="download" class="btn-ghost" href="#" target="_blank" rel="noopener" hidden>Open original</a>
      </header>
      <div id="detail-body" class="detail-body">
        <div id="empty" class="placeholder">
          <p>Pick a file on the left, or upload a new PDF to render its pages.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
  <script>initApp();</script>
</body>
</html>
